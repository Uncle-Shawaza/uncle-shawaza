<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>404 - Page Not Found | Uncle Shawaza</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-container {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 8rem;
            font-family: 'JetBrains Mono', monospace;
            color: #4a4a6a;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-image {
            max-width: 300px;
            margin: 2rem auto;
        }
        .error-image img {
            width: 100%;
            height: auto;
        }
        .error-message {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #5a5a77;
        }
        .home-button {
            background: #1e1e2a;
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .home-button:hover {
            background: #3a3a52;
            transform: translateY(-2px);
        }
    </style>
</head>
<body data-theme="light">

    <main>
        <div class="error-container">
            <div class="error-code">404</div>
            <div class="error-image">
                <img src="404.png" alt="404 Error - Page Not Found">
            </div>
            <div class="error-message">Oops! The page you're looking for doesn't exist.</div>
            <a href="/portfolio/" class="home-button">
                <i class="fa-solid fa-house"></i> Back to Home
            </a>
        </div>
    </main>


    <script src="theme.js"></script>
    <script src="script.js"></script>
</body>
</html>
